name: Notify deploy repo

on:
  push:
    branches: [main]  # change this to whichever branch should trigger builds

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger image rebuild in deploy repo
        run: |
          gh api repos/HikingClubIreland/hci-nop-deploy/dispatches \
            -f event_type=nop-source-updated
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_REPO_PAT }}
